[mcp_servers.github_repo]
  url = "https://api.githubcopilot.com/mcp/"
  bearer_token_env_var = "GITHUB_REPO_PAT"
  enabled = true
  required = false
  default_tools_approval_mode = "prompt"
  startup_timeout_sec = 30
  tool_timeout_sec = 60

  [mcp_servers.github_project]
  url = "https://api.githubcopilot.com/mcp/x/projects"
  bearer_token_env_var = "GITHUB_PROJECT_PAT"
  enabled = true
  required = false
  default_tools_approval_mode = "prompt"
  startup_timeout_sec = 30
  tool_timeout_sec = 60