<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theseus Track — App Prototype</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="track.css">
</head>
<body>

<svg style="display:none" aria-hidden="true">
  <symbol id="i-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></symbol>
  <symbol id="i-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></symbol>
  <symbol id="i-book-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></symbol>
  <symbol id="i-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></symbol>
  <symbol id="i-timer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></symbol>
  <symbol id="i-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l10-6.5-10-6.5Z"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></symbol>
  <symbol id="i-briefcase" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></symbol>
  <symbol id="i-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></symbol>
  <symbol id="i-leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></symbol>
  <symbol id="i-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></symbol>
</svg>

<div class="phone track-phone" id="phone">
  <header class="app-header">
    <span aria-hidden="true"></span>
    <div class="week-label">Today</div>
    <button class="icon-btn" data-detail="activity" aria-label="Activity detail"><svg><use href="#i-file-text"/></svg></button>
  </header>

  <main class="app-content">
    <div class="track-l1">
      <button class="recommended-activity" id="recommendedActivity" aria-label="Start recommended activity">
        <span class="recommend-mark" aria-hidden="true"><svg><use id="focusIcon" href="#i-code"/></svg></span>
        <span class="recommend-copy">
          <span class="recommend-title" id="focusTitle">Frontend build block</span>
          <span class="recommend-meta" id="focusMeta">Recommended now</span>
        </span>
      </button>

      <button class="timer-core" id="timerFocus" aria-label="Toggle focus activity timer">
        <span class="timer-state-mark" id="timerState" aria-hidden="true"></span>
        <span class="timer-value" id="timerDisplay">00:42:15</span>
      </button>

      <button class="timer-toggle" id="timerToggle" aria-label="Start focus activity">
        <svg><use id="timerToggleIcon" href="#i-play"/></svg>
      </button>

      <button class="today-total" data-sheet="logs" aria-label="Open today tracker">
        <span class="total-mark" aria-hidden="true"></span>
        <span id="totalValue">3h 25m</span>
      </button>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item" aria-label="Review" onclick="window.location.href='index.html'"><svg><use href="#i-book-open"/></svg></button>
    <button class="nav-item" aria-label="Signals" onclick="window.location.href='signals.html'"><svg><use href="#i-activity"/></svg></button>
    <button class="nav-item selected" aria-label="Track" aria-current="page"><svg><use href="#i-timer"/></svg></button>
    <button class="nav-item" aria-label="Plan" onclick="window.location.href='plan.html'"><svg><use href="#i-calendar"/></svg></button>
  </nav>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>

  <div class="sheet track-sheet" id="sheet-logs" data-sheet-id="logs">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <svg class="sh-icon full"><use href="#i-timer"/></svg>
      <div class="sh-title">Today</div>
      <button class="icon-btn sh-action" data-sheet="create" aria-label="New activity"><svg><use href="#i-plus"/></svg></button>
      <button class="icon-btn sh-close" data-close aria-label="Close"><svg><use href="#i-chevron-down"/></svg></button>
    </div>
    <div class="sheet-body">
      <div class="tracker-category">
        <div class="category-head"><span class="cat-dot project"></span><span>Project</span></div>
        <div class="tracker-row running selected" data-activity="frontend">
          <button class="tracker-row-main" data-activity-toggle="frontend" aria-label="Toggle frontend build block">
            <span class="tracker-icon"><svg><use href="#i-code"/></svg></span>
            <span class="tracker-name">Frontend build block</span>
            <span class="tracker-time">42m</span>
          </button>
          <button class="tracker-detail-btn" data-activity-detail="frontend" aria-label="Frontend build block detail"><svg><use href="#i-info"/></svg></button>
        </div>
        <div class="tracker-row" data-activity="backend">
          <button class="tracker-row-main" data-activity-toggle="backend" aria-label="Toggle backend polish">
            <span class="tracker-icon"><svg><use href="#i-briefcase"/></svg></span>
            <span class="tracker-name">Backend polish</span>
            <span class="tracker-time">24m</span>
          </button>
          <button class="tracker-detail-btn" data-activity-detail="backend" aria-label="Backend polish detail"><svg><use href="#i-info"/></svg></button>
        </div>
      </div>

      <div class="tracker-category">
        <div class="category-head"><span class="cat-dot study"></span><span>Study</span></div>
        <div class="tracker-row" data-activity="research">
          <button class="tracker-row-main" data-activity-toggle="research" aria-label="Toggle research notes">
            <span class="tracker-icon"><svg><use href="#i-book-open"/></svg></span>
            <span class="tracker-name">Research notes</span>
            <span class="tracker-time">55m</span>
          </button>
          <button class="tracker-detail-btn" data-activity-detail="research" aria-label="Research notes detail"><svg><use href="#i-info"/></svg></button>
        </div>
      </div>

      <div class="tracker-category">
        <div class="category-head"><span class="cat-dot health"></span><span>Health</span></div>
        <div class="tracker-row" data-activity="health">
          <button class="tracker-row-main" data-activity-toggle="health" aria-label="Toggle health walk">
            <span class="tracker-icon"><svg><use href="#i-leaf"/></svg></span>
            <span class="tracker-name">Health walk</span>
            <span class="tracker-time">45m</span>
          </button>
          <button class="tracker-detail-btn" data-activity-detail="health" aria-label="Health walk detail"><svg><use href="#i-info"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <div class="sheet track-sheet" id="sheet-create" data-sheet-id="create">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <svg class="sh-icon wins"><use href="#i-plus"/></svg>
      <div class="sh-title">New activity</div>
      <button class="icon-btn sh-close" data-close aria-label="Close"><svg><use href="#i-chevron-down"/></svg></button>
    </div>
    <div class="sheet-body create-body">
      <label class="paper-field">
        <span>Name</span>
        <input type="text" value="Design polish block" aria-label="Activity name">
      </label>

      <div class="chip-section" aria-label="Category">
        <button class="choice-chip selected" aria-pressed="true">Project</button>
        <button class="choice-chip" aria-pressed="false">Study</button>
        <button class="choice-chip" aria-pressed="false">Health</button>
      </div>

      <div class="chip-section" aria-label="Energy">
        <button class="choice-chip energy consume selected" aria-pressed="true">Consume</button>
        <button class="choice-chip energy restore" aria-pressed="false">Restore</button>
        <button class="choice-chip energy neutral" aria-pressed="false">Neutral</button>
      </div>

      <div class="swatch-row" aria-label="Color">
        <button class="color-swatch green selected" aria-label="Green"></button>
        <button class="color-swatch blue" aria-label="Blue"></button>
        <button class="color-swatch amber" aria-label="Amber"></button>
        <button class="color-swatch pink" aria-label="Pink"></button>
      </div>

      <button class="create-action" aria-label="Create activity"><svg><use href="#i-plus"/></svg></button>
    </div>
  </div>

  <div class="detail" id="detail-activity">
    <div class="detail-header">
      <button class="icon-btn" data-back aria-label="Back"><svg><use href="#i-chevron-left"/></svg></button>
      <div class="dh-title" id="activityDetailTitle">Frontend build block</div>
    </div>
    <div class="detail-body activity-detail-body">
      <div class="activity-detail-top">
        <span class="detail-color" id="activityDetailColor" aria-hidden="true"></span>
        <span class="energy-chip consume" id="activityDetailEnergy">consume</span>
      </div>

      <div class="evidence-row">
        <div class="er-label">Type</div>
        <div class="er-value" id="activityDetailCategory">Project · Build</div>
      </div>
      <div class="evidence-row">
        <div class="er-label">Today</div>
        <div class="er-value" id="activityDetailDuration">42m</div>
      </div>

      <label class="paper-note">
        <span>Session note</span>
        <textarea id="activityDetailNote" aria-label="Session note">Built the app-first tracker prototype and checked the tab timing flow.</textarea>
      </label>

      <div class="detail-action-row">
        <button class="detail-icon-action danger" aria-label="Delete activity"><svg><use href="#i-trash"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script src="track.js"></script>
</body>
</html>
